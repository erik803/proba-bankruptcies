services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bankruptcy
      POSTGRES_PASSWORD: bankruptcy
      POSTGRES_DB: bankruptcy
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bankruptcy"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
